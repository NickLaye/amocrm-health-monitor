name: Diagnose Server (temporary)

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Read-only server diagnostics
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Collect diagnostics (read-only)
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh "${SERVER_USER}@${SERVER_HOST}" "
            echo '===== PM2 LIST =====';            pm2 list 2>&1 || true
            echo '===== PM2 DESCRIBE =====';        pm2 describe amocrm-health-monitor 2>&1 | grep -iE 'status|restart|script path|exec cwd|error log|out log|version|uptime|node' || true
            echo '===== NODE VERSION =====';         node -v 2>&1 || true
            echo '===== DOTENV INSTALLED? =====';    ls -d '${DEPLOY_PATH}'/current/node_modules/dotenv 2>&1 || echo 'dotenv MISSING'
            echo '===== node_modules count =====';   ls '${DEPLOY_PATH}'/current/node_modules 2>/dev/null | wc -l || true
            echo '===== .env PRESENT? =====';        { [ -f '${DEPLOY_PATH}'/.env ] && echo 'root .env: yes'; } || echo 'root .env: NO'; { [ -f '${DEPLOY_PATH}'/current/.env ] && echo 'current/.env: yes'; } || echo 'current/.env: NO'
            echo '===== ENV KEY NAMES (no values) ====='; grep -oE '^[A-Za-z0-9_]+' '${DEPLOY_PATH}'/current/.env 2>/dev/null | sort -u || echo 'cannot read current/.env'
            echo '===== WINSTON error log (tail) ====='; tail -n 60 \$(ls -t '${DEPLOY_PATH}'/current/logs/error-*.log 2>/dev/null | head -1) 2>&1 || echo 'no winston error log'
            echo '===== WINSTON exceptions log (tail) ====='; tail -n 40 \$(ls -t '${DEPLOY_PATH}'/current/logs/exceptions-*.log 2>/dev/null | head -1) 2>&1 || echo 'no exceptions log'
            echo '===== STEP-BY-STEP STARTUP (no monitoring, synchronous errors) ====='; cd '${DEPLOY_PATH}'/current && timeout 30 node -e \"require('dotenv').config({quiet:true});(async()=>{try{const v=require('./server/config/env-validator');v.validateEnv();console.log('OK validateEnv');const db=require('./server/database');await db.initialize();console.log('OK db.initialize');const A=require('./server/app-server');const app=new A().initialize();console.log('OK AppServer.initialize');const agg=require('./server/aggregator');agg.start();console.log('OK aggregator.start');await new Promise(r=>app.listen(3999,'0.0.0.0',()=>{console.log('OK listen 3999');r()}));console.log('ALL STARTUP STEPS OK (monitor.start skipped)');process.exit(0)}catch(e){console.log('STARTUP ERROR:');console.log(e&&e.stack?e.stack:e);process.exit(1)}})()\" 2>&1 | head -70 || true
          "
