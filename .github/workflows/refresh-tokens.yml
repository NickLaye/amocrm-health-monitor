name: Refresh amoCRM Tokens on Server

on:
  workflow_dispatch:

jobs:
  refresh-tokens:
    name: Push fresh tokens to server
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Exchange auth code or push long-term token
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          ACCESS_TOKEN: ${{ secrets.AMOCRM_ACCESS_TOKEN }}
          REFRESH_TOKEN: ${{ secrets.AMOCRM_REFRESH_TOKEN }}
          CLIENT_ID: ${{ secrets.AMOCRM_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.AMOCRM_CLIENT_SECRET }}
        run: |
          # If we have a refresh_token, try to get fresh pair from amoCRM
          if [ -n "$REFRESH_TOKEN" ]; then
            echo "Attempting token refresh via amoCRM API..."
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "https://skillssales.amocrm.ru/oauth2/access_token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "client_id=${CLIENT_ID}" \
              --data-urlencode "client_secret=${CLIENT_SECRET}" \
              --data-urlencode "grant_type=refresh_token" \
              --data-urlencode "refresh_token=${REFRESH_TOKEN}" \
              --data-urlencode "redirect_uri=https://www.simple.com")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Got fresh tokens from amoCRM"
              NOW=$(date +%s)
              EXPIRES_IN=$(echo "$BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('expires_in',86400))")
              EXPIRES_AT=$((NOW + EXPIRES_IN))
              TOKENS_JSON=$(echo "$BODY" | python3 -c "
import json,sys,os
d=json.load(sys.stdin)
d['expires_at'] = int(os.environ['EXPIRES_AT'])
print(json.dumps(d, indent=2))
" EXPIRES_AT=$EXPIRES_AT)
            else
              echo "⚠️ Refresh failed (${HTTP_CODE}), using long-term token from secrets"
              TOKENS_JSON=$(python3 -c "
import json, os, time
print(json.dumps({
  'token_type': 'Bearer',
  'expires_in': 86400,
  'access_token': os.environ['ACCESS_TOKEN'],
  'refresh_token': os.environ.get('REFRESH_TOKEN', ''),
  'expires_at': 1861833600
}, indent=2))
")
            fi
          else
            echo "No refresh token — using long-term access token"
            TOKENS_JSON=$(python3 -c "
import json, os
print(json.dumps({
  'token_type': 'Bearer',
  'expires_in': 86400,
  'access_token': os.environ['ACCESS_TOKEN'],
  'refresh_token': '',
  'expires_at': 1861833600
}, indent=2))
")
          fi

          echo "Writing tokens to server..."
          ssh ${SERVER_USER}@${SERVER_HOST} bash << ENDSSH
            set -e
            DATA_DIR="${DEPLOY_PATH}/current/data"
            mkdir -p "\$DATA_DIR"
            [ -f "\$DATA_DIR/default.tokens.json" ] && cp "\$DATA_DIR/default.tokens.json" "\$DATA_DIR/default.tokens.json.bak"
            cat > "\$DATA_DIR/default.tokens.json" << 'JSONEOF'
${TOKENS_JSON}
JSONEOF
            echo "Tokens written. Reloading PM2..."
            pm2 reload amocrm-health-monitor || pm2 restart amocrm-health-monitor
ENDSSH

      - name: Update .env on server with new integration credentials
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          CLIENT_ID: ${{ secrets.AMOCRM_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.AMOCRM_CLIENT_SECRET }}
        run: |
          if [ -n "$CLIENT_ID" ]; then
            ssh ${SERVER_USER}@${SERVER_HOST} bash << ENDSSH
              ENV_FILE="${DEPLOY_PATH}/.env"
              if [ -f "\$ENV_FILE" ]; then
                sed -i "s|^AMOCRM_CLIENT_ID=.*|AMOCRM_CLIENT_ID=${CLIENT_ID}|" "\$ENV_FILE"
                sed -i "s|^AMOCRM_CLIENT_SECRET=.*|AMOCRM_CLIENT_SECRET=${CLIENT_SECRET}|" "\$ENV_FILE"
                echo "✅ Updated CLIENT_ID and CLIENT_SECRET in .env"
              fi
ENDSSH
          fi

      - name: Verify health
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          sleep 12
          STATUS=$(curl -sk https://${SERVER_HOST}/health | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('status','?'))" 2>/dev/null || echo "failed")
          echo "Health: $STATUS"
          [ "$STATUS" = "ok" ] && echo "✅ Server healthy" || echo "⚠️ Status: $STATUS"
