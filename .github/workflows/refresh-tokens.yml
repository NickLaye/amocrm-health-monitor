name: Refresh amoCRM Tokens on Server

on:
  workflow_dispatch:

jobs:
  refresh-tokens:
    name: Push fresh tokens to server
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Build and push fresh tokens
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          ACCESS_TOKEN: ${{ secrets.AMOCRM_ACCESS_TOKEN }}
          REFRESH_TOKEN: ${{ secrets.AMOCRM_REFRESH_TOKEN }}
          CLIENT_ID: ${{ secrets.AMOCRM_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.AMOCRM_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          TOKENS_JSON=""
          if [ -n "${REFRESH_TOKEN:-}" ]; then
            echo "Attempting token refresh via amoCRM API..."
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "https://skillssales.amocrm.ru/oauth2/access_token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "client_id=${CLIENT_ID}" \
              --data-urlencode "client_secret=${CLIENT_SECRET}" \
              --data-urlencode "grant_type=refresh_token" \
              --data-urlencode "refresh_token=${REFRESH_TOKEN}" \
              --data-urlencode "redirect_uri=https://www.simple.com")
            HTTP_CODE=$(printf '%s' "$RESPONSE" | tail -n1)
            BODY=$(printf '%s' "$RESPONSE" | sed '$d')
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Got fresh tokens from amoCRM"
              NOW=$(date +%s)
              EXPIRES_IN=$(printf '%s' "$BODY" | jq -r '.expires_in // 86400')
              EXPIRES_AT=$((NOW + EXPIRES_IN))
              TOKENS_JSON=$(printf '%s' "$BODY" | jq --argjson ea "$EXPIRES_AT" '. + {expires_at: $ea}')
            else
              echo "Refresh failed (${HTTP_CODE}), using long-term token from secrets"
              TOKENS_JSON=$(jq -n --arg at "${ACCESS_TOKEN:-}" --arg rt "${REFRESH_TOKEN:-}" \
                '{token_type:"Bearer", expires_in:86400, access_token:$at, refresh_token:$rt, expires_at:1861833600}')
            fi
          else
            echo "No refresh token — using long-term access token"
            TOKENS_JSON=$(jq -n --arg at "${ACCESS_TOKEN:-}" \
              '{token_type:"Bearer", expires_in:86400, access_token:$at, refresh_token:"", expires_at:1861833600}')
          fi

          echo "Writing tokens to server..."
          TOKENS_B64=$(printf '%s' "$TOKENS_JSON" | base64 | tr -d '\n')
          ssh "${SERVER_USER}@${SERVER_HOST}" "set -e; DATA_DIR='${DEPLOY_PATH}/current/data'; mkdir -p \"\$DATA_DIR\"; { [ -f \"\$DATA_DIR/default.tokens.json\" ] && cp \"\$DATA_DIR/default.tokens.json\" \"\$DATA_DIR/default.tokens.json.bak\"; } || true; printf '%s' '${TOKENS_B64}' | base64 -d > \"\$DATA_DIR/default.tokens.json\"; echo 'Tokens written. Reloading PM2...'; pm2 reload amocrm-health-monitor || pm2 restart amocrm-health-monitor"

      - name: Update .env on server with new integration credentials
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          CLIENT_ID: ${{ secrets.AMOCRM_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.AMOCRM_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          if [ -n "${CLIENT_ID:-}" ]; then
            ssh "${SERVER_USER}@${SERVER_HOST}" "ENV_FILE='${DEPLOY_PATH}/.env'; if [ -f \"\$ENV_FILE\" ]; then sed -i \"s|^AMOCRM_CLIENT_ID=.*|AMOCRM_CLIENT_ID=${CLIENT_ID}|\" \"\$ENV_FILE\"; sed -i \"s|^AMOCRM_CLIENT_SECRET=.*|AMOCRM_CLIENT_SECRET=${CLIENT_SECRET}|\" \"\$ENV_FILE\"; echo 'Updated CLIENT_ID and CLIENT_SECRET in .env'; fi"
          fi

      - name: Verify health
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          sleep 12
          STATUS=$(curl -sk "https://${SERVER_HOST}/health" | jq -r '.status // "?"' 2>/dev/null || echo "failed")
          echo "Health: $STATUS"
          if [ "$STATUS" = "ok" ]; then
            echo "Server healthy"
          else
            echo "Status: $STATUS"
          fi
