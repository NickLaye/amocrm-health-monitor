name: Rotate admin credentials [temporary]

on:
  workflow_dispatch:

jobs:
  rotate:
    name: Update ADMIN_USER/ADMIN_PASSWORD on server
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Apply new creds and restart
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          ssh "${SERVER_USER}@${SERVER_HOST}" "
            set -e
            for f in '${DEPLOY_PATH}/.env' '${DEPLOY_PATH}/current/.env'; do
              [ -f \"\$f\" ] || continue
              cp \"\$f\" \"\$f.bak.\$(date +%s)\" 2>/dev/null || true
              sed -i \"s|^ADMIN_USER=.*|ADMIN_USER=$ADMIN_USER|\" \"\$f\"
              sed -i \"s|^ADMIN_PASSWORD=.*|ADMIN_PASSWORD=$ADMIN_PASSWORD|\" \"\$f\"
              echo \"updated: \$f\"
            done
            pm2 restart amocrm-health-monitor --update-env
            echo 'restarted'
          "

      - name: Verify new creds work and old admin:admin is gone
        env:
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          sleep 8
          NEW=$(curl -s -m 12 -o /dev/null -w '%{http_code}' -u "$ADMIN_USER:$ADMIN_PASSWORD" https://amohealth.nicklayecrm.ru/api/clients || echo 000)
          OLD=$(curl -s -m 12 -o /dev/null -w '%{http_code}' -u 'admin:admin' https://amohealth.nicklayecrm.ru/api/clients || echo 000)
          echo "new creds  -> HTTP $NEW (expect 200)"
          echo "admin:admin -> HTTP $OLD (expect 401)"
          if [ "$NEW" = "200" ] && [ "$OLD" = "401" ]; then
            echo "Rotation successful."
          else
            echo "Rotation verification failed."
            exit 1
          fi
